name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/volt-dashboard/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install -r app/dashboard/requirements.txt

      - name: Install Node.js dependencies
        working-directory: app/volt-dashboard
        run: npm ci

      - name: Build frontend
        working-directory: app/volt-dashboard
        run: npm run build

      - name: Verify build output
        run: |
          test -d app/volt-dashboard/dist && echo "Frontend build OK" || exit 1

      - name: Lint Python
        run: |
          pip install ruff
          ruff check app/dashboard/ --exit-non-zero-on-fix || true
