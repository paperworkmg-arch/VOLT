name: Pylint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install -r app/dashboard/requirements.txt
          uv pip install pylint
      - name: Analysing with pylint
        run: |
          pylint app/dashboard/*.py --fail-under=5.0 --disable=C0114,C0115,C0116,R0903,W0611,E0401 || true
