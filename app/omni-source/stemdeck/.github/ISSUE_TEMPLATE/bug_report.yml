name: Bug report
description: Something isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill in the details so we can reproduce it.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before reporting
      options:
        - label: I'm on the latest release and the issue still happens.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ..., StemDeck ... but I expected ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open StemDeck
        2. Import ...
        3. Click ...
        4. See error
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: StemDeck version
      description: Shown in the About dialog (Help icon).
      placeholder: e.g. v0.7.0-alpha.12
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - macOS DMG
        - Windows ZIP
        - From source
        - Docker / self-hosted
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots
      description: Drag in screenshots or a recording, and paste any error text as code.
